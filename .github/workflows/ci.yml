name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_placeholder?schema=public
      JWT_SECRET: ci-test-jwt-secret-min-32-chars-long
      DISABLE_THROTTLE: "true"
      CONSULTATION_SLA_CRON: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
